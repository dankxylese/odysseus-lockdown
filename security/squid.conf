# Squid egress proxy for odysseus container.
#
# Policy: DENY by default. Only the destinations listed below are reachable.
# odysseus connects via HTTP_PROXY=http://proxy:3128 set in compose.
# For HTTPS, Squid sees the hostname in the CONNECT tunnel — no SSL decryption.
#
# To allow an additional domain: add an acl line and restart the proxy container.
#   podman compose -f docker-compose.yml -f docker-compose.podman.yml restart proxy

http_port 3128

# ── Allowed destinations ──────────────────────────────────────────────────────
# Leading dot matches the domain itself and all its subdomains.

# HuggingFace — model downloads, datasets, API, LFS CDN
acl allowed dstdomain .huggingface.co
acl allowed dstdomain .hf.co

# Python packages (.pypi.org covers pypi.org itself and all subdomains)
acl allowed dstdomain .pypi.org
acl allowed dstdomain files.pythonhosted.org

# Debian apt (python:3.12-slim base image)
acl allowed dstdomain .debian.org

# GitHub — pip install from git, model repos, release tarballs
acl allowed dstdomain .github.com
acl allowed dstdomain .githubusercontent.com
acl allowed dstdomain .githubassets.com

# Playwright browser binaries (exact hostname — not a wildcard over azureedge.net)
acl allowed dstdomain playwright.azureedge.net

# ── Access policy ─────────────────────────────────────────────────────────────

# Squid management from localhost inside the container
http_access allow localhost

# Allow HTTPS tunnels (CONNECT) to whitelisted domains
acl CONNECT method CONNECT
http_access allow CONNECT allowed

# Allow plain HTTP to whitelisted domains
http_access allow allowed

# Deny everything else — this is the default-deny line
http_access deny all

# ── Privacy and performance ───────────────────────────────────────────────────

# No caching — we're a security proxy, not a CDN accelerator
cache deny all

# Create log files as 644 so they're readable on the host without elevation.
# Without this, squid defaults to umask 027 (640 files, unreadable by others).
umask 022

# Disable ICMP pinger — raw sockets are not available in rootless containers
pinger_enable off

# Don't leak the client container's IP to upstream servers
forwarded_for off
via off

# Don't advertise Squid version in responses
httpd_suppress_version_string on

# Log to stdout (podman logs proxy) AND to a file in the bind-mounted
# security/logs/ directory. Both streams stay in sync.
access_log stdio:/dev/stdout combined
access_log /var/log/squid/access.log combined
cache_log /dev/stderr

# Keep 3 rotated copies when SIGUSR1 triggers rotation (see proxy-entrypoint.sh)
logfile_rotate 3
